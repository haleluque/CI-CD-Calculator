# GitHub Actions workflow configuration
# This workflow builds a Maven-based Java project, runs checks, and pushes a Docker image to GHCR.
name: CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

# Required for pushing images to GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Prepare Action
      uses: ./.github/workflows/prepareAction

    # Build the project with Maven, skipping tests
    - run: mvn -B package -DskipTests --file pom.xml

    # Prepare Artifacts
    - run: |
        mkdir -p build
        cp target/*.jar build/

    # Upload the JAR artifact
    - name: Upload Artifact
    
      uses: actions/upload-artifact@v4
      with:
        name: calculator-app
        path: build/

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Prepare Action
      uses: ./.github/workflows/prepareAction

    # Run Linting: compliance checkstyle and defined code rules
    - name: Run Linting
      run: mvn checkstyle:check

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Prepare Action
      uses: ./.github/workflows/prepareAction

    # Run Tests
    - name: Run Tests
      run: mvn test

  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Run Trivy vulnerability scanner
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

  # Build Docker image and push to GitHub Packages (only on push to main/master)
  docker:
    needs: [ build, lint, test, security ]
    runs-on: ubuntu-latest
    # Only build and push Docker image on push to main/master, to avoid unnecessary builds on every PR
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      # Set image name (GHCR requires lowercase)
      - name: Set image name (GHCR requires lowercase)
        id: meta
        run: |
          echo "image=ghcr.io/$(echo $GITHUB_REPOSITORY | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
